name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:       # Manual trigger
  # schedule removed: was burning ~120 min/day on private repo during active development

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ── Daily activity guard ────────────────────────────────────────────────
  # All analysis jobs declare needs: check-activity and a job-level if condition.
  # Using exit 0 inside a run step does NOT stop subsequent steps — guard must be
  # at the job level (review-brief.md B3).
  check-activity:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for recent commits
        id: check
        run: |
          COUNT=$(git log --since="24 hours ago" --oneline | wc -l)
          if [ "$COUNT" -gt "0" ]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
          else
            echo "should-run=false" >> $GITHUB_OUTPUT
            echo "No commits in last 24h — skipping scheduled analysis"
          fi

  # ── Python jobs (all parallel) ─────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    needs: check-activity
    if: github.event_name != 'schedule' || needs.check-activity.outputs.should-run == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run ruff check app/ tests/

  format:
    runs-on: ubuntu-latest
    needs: check-activity
    if: github.event_name != 'schedule' || needs.check-activity.outputs.should-run == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run ruff format --check app/ tests/

  typecheck:
    runs-on: ubuntu-latest
    needs: check-activity
    if: github.event_name != 'schedule' || needs.check-activity.outputs.should-run == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run mypy app/ --strict

  security:
    runs-on: ubuntu-latest
    needs: check-activity
    if: github.event_name != 'schedule' || needs.check-activity.outputs.should-run == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run bandit -r app/ -ll

  dependencies:
    runs-on: ubuntu-latest
    needs: check-activity
    if: github.event_name != 'schedule' || needs.check-activity.outputs.should-run == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run pip-audit    # PyPA-maintained; OSV database; no auth required

  test:
    runs-on: ubuntu-latest
    needs: check-activity
    if: github.event_name != 'schedule' || needs.check-activity.outputs.should-run == 'true'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ vars.CI_DB_USER }}
          POSTGRES_PASSWORD: ${{ vars.CI_DB_PASSWORD }}
          POSTGRES_DB: ${{ vars.CI_DB_NAME }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://${{ vars.CI_DB_USER }}:${{ vars.CI_DB_PASSWORD }}@localhost:5432/${{ vars.CI_DB_NAME }}
      - run: uv run pytest tests/ --cov=app --cov-report=xml --cov-fail-under=80 --ignore=tests/e2e/
        env:
          SPREADSHEET_ID: dummy
          DATABASE_URL: postgresql+asyncpg://${{ vars.CI_DB_USER }}:${{ vars.CI_DB_PASSWORD }}@localhost:5432/${{ vars.CI_DB_NAME }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Frontend jobs (parallel with Python) ───────────────────────────────
  fe-lint:
    runs-on: ubuntu-latest
    needs: check-activity
    if: github.event_name != 'schedule' || needs.check-activity.outputs.should-run == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19'
      - run: npm ci
      - run: npm run lint -- --max-warnings 0

  fe-test:
    runs-on: ubuntu-latest
    needs: check-activity
    if: github.event_name != 'schedule' || needs.check-activity.outputs.should-run == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19'
      - run: npm ci
      - run: npm test

  fe-build:
    runs-on: ubuntu-latest
    needs: check-activity
    if: github.event_name != 'schedule' || needs.check-activity.outputs.should-run == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19'
      - run: npm ci
      - run: npm run build

  fe-e2e:
    runs-on: ubuntu-latest
    needs: check-activity
    if: github.event_name != 'schedule' || needs.check-activity.outputs.should-run == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Build frontend
        run: npm run build
      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          PW_BASE_URL: ${{ vars.PW_BASE_URL || '' }}
          CI: true
          E2E_AUTH_BYPASS: "1"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ── Static analysis (parallel with all above) ───────────────────────────
  # codeql: disabled — requires GitHub Advanced Security (paid)
  semgrep:
    runs-on: ubuntu-latest
    needs: check-activity
    if: github.event_name != 'schedule' || needs.check-activity.outputs.should-run == 'true'
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v6
      - run: semgrep --config=p/python --config=p/typescript --config=p/react --config=p/secrets --error .

  # ── Permanent secret scanning gate (12th required check) ────────────────
  gitleaks:
    runs-on: ubuntu-latest
    needs: check-activity
    if: github.event_name != 'schedule' || needs.check-activity.outputs.should-run == 'true'
    permissions:
      pull-requests: read
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

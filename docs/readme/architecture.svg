<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420" role="img" aria-label="Architecture diagram: React SPA frontend communicates with FastAPI backend over HTTP/JSON; backend connects to PostgreSQL database and external AI providers (Anthropic Claude and Google Gemini); optional Google OAuth flow shown">
  <title>espresso-logs architecture overview</title>
  <defs>
    <style>
      text { font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace; }
      .label { font-size: 11px; fill: #d97706; }
      .sublabel { font-size: 10px; fill: #92400e; }
      .box { rx: 8; ry: 8; }
      .arrow { stroke: #92400e; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 5,3; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#92400e" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="420" fill="#1c1008" rx="12" ry="12" />

  <!-- Browser / User -->
  <rect x="30" y="165" width="130" height="90" fill="#2d1a00" stroke="#d97706" stroke-width="1.5" rx="8" ry="8" />
  <text x="95" y="205" text-anchor="middle" class="label" font-weight="bold">Browser / PWA</text>
  <text x="95" y="220" text-anchor="middle" class="sublabel">React 19 + Vite</text>
  <text x="95" y="234" text-anchor="middle" class="sublabel">TailwindCSS + DaisyUI</text>
  <text x="95" y="248" text-anchor="middle" class="sublabel">TanStack Query v5</text>

  <!-- Arrow: Browser → API -->
  <line x1="160" y1="210" x2="215" y2="210" class="arrow" />
  <text x="186" y="204" text-anchor="middle" class="sublabel">HTTP/JSON</text>

  <!-- FastAPI backend -->
  <rect x="215" y="130" width="160" height="160" fill="#2d1a00" stroke="#d97706" stroke-width="1.5" rx="8" ry="8" />
  <text x="295" y="158" text-anchor="middle" class="label" font-weight="bold">FastAPI Backend</text>
  <text x="295" y="173" text-anchor="middle" class="sublabel">Python 3.12 + uvicorn</text>
  <line x1="225" y1="183" x2="365" y2="183" stroke="#d97706" stroke-width="0.5" stroke-dasharray="3,3" />
  <text x="295" y="198" text-anchor="middle" class="sublabel">JWT auth + rate limits</text>
  <text x="295" y="212" text-anchor="middle" class="sublabel">households + members</text>
  <text x="295" y="226" text-anchor="middle" class="sublabel">brew log + catalog</text>
  <text x="295" y="240" text-anchor="middle" class="sublabel">hardware + inventory</text>
  <text x="295" y="254" text-anchor="middle" class="sublabel">import wizard</text>
  <text x="295" y="268" text-anchor="middle" class="sublabel">AI inference service</text>

  <!-- Arrow: API → DB -->
  <line x1="375" y1="210" x2="440" y2="210" class="arrow" />
  <text x="407" y="204" text-anchor="middle" class="sublabel">asyncpg</text>

  <!-- PostgreSQL -->
  <rect x="440" y="165" width="130" height="90" fill="#2d1a00" stroke="#d97706" stroke-width="1.5" rx="8" ry="8" />
  <text x="505" y="205" text-anchor="middle" class="label" font-weight="bold">PostgreSQL</text>
  <text x="505" y="220" text-anchor="middle" class="sublabel">SQLAlchemy async</text>
  <text x="505" y="234" text-anchor="middle" class="sublabel">Alembic migrations</text>
  <text x="505" y="248" text-anchor="middle" class="sublabel">multi-tenant rows</text>

  <!-- Arrow: API → AI (dashed) -->
  <line x1="295" y1="130" x2="295" y2="65" class="arrow dashed" />
  <text x="305" y="103" class="sublabel">AI calls</text>

  <!-- AI Providers -->
  <rect x="175" y="20" width="240" height="45" fill="#2d1a00" stroke="#b45309" stroke-width="1" stroke-dasharray="5,3" rx="8" ry="8" />
  <text x="295" y="38" text-anchor="middle" class="label">AI Providers (optional)</text>
  <text x="295" y="54" text-anchor="middle" class="sublabel">Anthropic Claude (primary)  ·  Google Gemini (fallback)</text>

  <!-- Arrow: API → Google OAuth (dashed) -->
  <line x1="375" y1="165" x2="580" y2="100" class="arrow dashed" />
  <text x="500" y="128" class="sublabel">OAuth 2.0</text>

  <!-- Google OAuth -->
  <rect x="570" y="60" width="130" height="45" fill="#2d1a00" stroke="#b45309" stroke-width="1" stroke-dasharray="5,3" rx="8" ry="8" />
  <text x="635" y="78" text-anchor="middle" class="label">Google OAuth</text>
  <text x="635" y="93" text-anchor="middle" class="sublabel">optional sign-in</text>

  <!-- Legend -->
  <line x1="30" y1="385" x2="55" y2="385" stroke="#d97706" stroke-width="1.5" />
  <text x="60" y="389" class="sublabel">core path</text>
  <line x1="130" y1="385" x2="155" y2="385" stroke="#b45309" stroke-width="1" stroke-dasharray="5,3" />
  <text x="160" y="389" class="sublabel">optional / external</text>
</svg>

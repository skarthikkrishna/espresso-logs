# Alembic configuration for espresso-logs.
# DATABASE_URL is NOT hardcoded here — it is read from the environment in env.py.
# See plan.md §AD-M1-02.

[alembic]
script_location = alembic
prepend_sys_path = .

# Empty — overridden at runtime via env.py reading DATABASE_URL from environment.
sqlalchemy.url =

# Use human-readable filenames: 0001_initial_schema.py
file_template = %%(rev)s_%%(slug)s

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
